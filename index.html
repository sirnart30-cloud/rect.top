<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รู้จักตัวเองมากขึ้น</title>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            max-width: 400px;
            width: 90%;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }
        p {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 2rem;
        }
        .start-btn {
            background-color: #ffde59;
            color: #333;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, background-color 0.2s;
            display: inline-block;
        }
        .start-btn:hover {
            transform: scale(1.05);
            background-color: #fff;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <h1>ตอบคำถามเพื่อที่จะให้คุณได้รู้จักตัวเองมากขึ้น</h1>
        <p>เริ่มต้นการเดินทางค้นหาตัวตนของคุณผ่านคำถามสั้นๆ ที่จะช่วยให้คุณเห็นมุมมองใหม่ๆ ในชีวิต</p>
        
        <a href="#" class="start-btn">เริ่มทำแบบทดสอบ</a>
    </div>

</body>
</html>
